<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔵 Navbar -->
<nav class="navbar">
    <div class="logo">EasyShop</div>
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="categories.html">Categories</a></li>
        <li><a href="#">Deals</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<!-- 🟢 Hero Section -->
<section class="hero">
    <div class="hero-text">
        <h1>Fresh Groceries Delivered</h1>
        <p>Best quality fruits & vegetables at your door</p>
        <a href="categories.html" class="btn">Shop Now</a>
    </div>
</section>

<!-- 🟡 Categories -->
<section class="products">
    <h2>Fruits & Vegetables</h2>

    <div class="category-container">

        <div class="category-card">
            <a href="categories.html" class="category-link">
                <div class="category-img-box">
                    <img src="papaya.jpg" onerror="this.src='default.png'">
                </div>
                <p class="category-text">Premium Fruits</p>
            </a>
        </div>

        <div class="category-card">
            <a href="categories.html" class="category-link">
                <div class="category-img-box">
                    <img src="download (1).jpg" onerror="this.src='default.png'">
                </div>
                <p class="category-text">Vegetables</p>
            </a>
        </div>

    </div>
</section>

<!-- 🔴 Footer -->
<footer class="footer">
    <p>© 2026 EasyShop | All Rights Reserved</p>
</footer>

</body>
</html>
